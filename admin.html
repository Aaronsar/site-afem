<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>AFEM Admin</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

  <!-- Login -->
  <div id="admin-login" class="admin-login" style="display:none;">
    <div class="admin-login-card">
      <img src="assets/logo.png" alt="AFEM">
      <h1>Backoffice AFEM</h1>
      <p>Connectez-vous pour gérer le contenu du site</p>
      <form id="login-form">
        <label>Email</label>
        <input type="email" id="login-email" required placeholder="votre@email.com">
        <label>Mot de passe</label>
        <input type="password" id="login-password" required placeholder="Mot de passe">
        <button type="submit" class="btn-login">Se connecter</button>
        <div id="login-error" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="admin-dashboard" class="admin-layout" style="display:none;">

    <!-- Top bar -->
    <div class="admin-topbar">
      <img src="assets/logo.png" alt="AFEM">
      <span class="admin-topbar-title">Backoffice</span>
      <button class="btn-logout" onclick="adminLogout()">Déconnexion</button>
    </div>

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div id="admin-sidebar-list"></div>
    </aside>

    <!-- Main content -->
    <main class="admin-main">
      <div id="admin-main-content">
        <div class="admin-main-empty">
          <div>
            <p style="font-size:36px;margin-bottom:16px;">&#128221;</p>
            <p>Sélectionnez une page dans le menu pour commencer l'édition.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast notification -->
  <div id="admin-toast" class="admin-toast"></div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
